name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DVMP_BUILD_BENCHMARKS=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format-19
        run: sudo apt-get update && sudo apt-get install -y clang-format-19
      - name: Check formatting
        run: |
          find src tests examples benchmarks -type f \( -name '*.cpp' -o -name '*.h' \) \
            -exec clang-format-19 --dry-run --Werror {} +
